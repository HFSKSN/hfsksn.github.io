site_name: EGR 314 Kaysan Datasheet
site_url: https://hfsksn.github.io/
repo_url: https://github.com/HFSKSN/hfsksn.github.io
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: custom_theme/partials
  palette:
    primary: blue
    accent: indigo
  font:
    text: Roboto
  logo: static/logo314.svg
  favicon: static/logo314.png

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.overflow
    - toc.follow    
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - content.action.edit
    - navigation.footer
#    - navigation.sections
    - navigation.expand
#    - navigation.instant # doesn't work that well

markdown_extensions:
  - attr_list #add attributes using curly brackets to images, see https://squidfunk.github.io/mkdocs-material/reference/images/
  - md_in_html # see https://squidfunk.github.io/mkdocs-material/reference/images/
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tilde: {}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

draft_docs: |
  **/*_unpublished.md
  **/*_draft.md
  **/*_draft**
  
plugins:
  - search
  - glightbox # allow resize images, see https://squidfunk.github.io/mkdocs-material/reference/images/

extra_css:
  - stylesheets/extra.css  

extra_javascript:
 - javascripts/mathjax.js
 - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    
not_in_nav: |
  static
  
copyright: "Copyright &copy; 2026 Team 201"

extra:
  generator: false
  social:
    - icon: fontawesome/regular/file-code
      link: /2026_spring
      name: 2026 Site    

nav:
  - Home: index.md
  - Requirements: 01-Requirements/Requirements.md
  - Block Diagram: 02-Block-Diagram/Block-Diagram.md
  - Component Selection: 03-Component-Selection/Component-Selection.md
  - Microcontroller Selection: 04-Microcontroller/microcontroller.md
  - Power Budget: 05-Power/power.md
  - Schematic: 07-Schematic/schematic.md
  - BOM: 06-BOM/BOM.md
  - PCB: 08-PCB/pcb.md
  - API: 09-API/api.md
  - Hardware Version 2.0: 10-Hardware-V2.0/v2.md
  - Resources: 11-Resources/resources.md
  - Reflection: 12-Reflection/reflection.md
  - Appendix: Appendix/index.md
